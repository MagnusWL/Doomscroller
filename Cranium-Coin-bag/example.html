<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cranium coin bag — eksempel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px 24px;
  background: radial-gradient(120% 90% at 50% 34%, #261c11 0%, #16110a 46%, #0b0805 100%);
  color: #e9eaec;
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Det eneste der egentlig skal til ────────────────────────────────────────
   Kraniet er ét canvas. 560×380 er den kasse designet er lavet i: liggende,
   med luft i siderne til mønter der vælter ud. Motoren læser kassen ved
   fødslen og skalerer alt efter dens HØJDE. Tallet ved siden af er dit eget —
   motoren tegner det ikke. ──────────────────────────────────────────────── */
.skull { display: flex; align-items: flex-end; gap: 14px; }
.skull canvas { width: 560px; height: 380px; display: block; }
.skull .count {
  margin-bottom: 30px;
  font-size: 28px;
  font-variant-numeric: tabular-nums;
  color: #f5be3c;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
}

.btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.btn {
  padding: 9px 15px;
  border: 1px solid #4a3f2a;
  border-radius: 9px;
  background: #241c10;
  color: #e9eaec;
  font-size: 13px;
  cursor: pointer;
}
.btn:hover { background: #2e2415; }
.btn.gold { border-color: #f5be3c; background: rgba(245, 190, 60, 0.14); color: #f5be3c; }
.note { font-size: 11.5px; color: #8a7f6a; text-align: center; max-width: 480px; line-height: 1.5; }
</style>
</head>
<body>

<div class="skull">
  <canvas id="skull" aria-hidden="true"></canvas>
  <span class="count" id="count">0</span>
</div>

<div class="btns">
  <button class="btn gold" data-add="1">Saml en mønt op</button>
  <button class="btn" data-add="10">+10</button>
  <button class="btn" data-spend="8">Køb (−8)</button>
  <button class="btn" data-reset>Nulstil</button>
</div>

<div class="note" id="note">Tryk et sted for at give lyden lov</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="sounds-inline.js"></script>
<script src="coin-sack-engine.global.js"></script>
<script>
(function () {
'use strict';

const $ = s => document.querySelector(s);
let coins = 0;
let sack = null;

/* ═══ Nicolais opskrift fra pixel-lab, 20. juli — DEN her blok er leverancen.
   Kunsten i assets/skull/ er allerede bagt efter den (160 klodser, kulør
   beholdt, 8 lysheds-trin, hårde kanter), så filerne og tallene hører sammen. */
function options() {
  return {
    style: 'artsack',
    geometry: 'skull',                    // kraniets indre — mål, klip, skala
    art: {
      bg: 'assets/skull/back.png',        // hulrummet, bag mønterne
      fg: 'assets/skull/skull.png',       // ansigt + krone, foran mønterne
    },
    coinTones: ['#fff6d6', '#ffe08a', '#f5be3c', '#c6871f', '#7e5212'],
    pixelate: true,
    pixelSize: 2.2,                       // møntklods 3.18 bufferpixels
    fillCount: 30,                        // hjerneskallen rummer 30
    groundShadow: false,                  // skyggen under kraniet: slettet
    // I spillet (serveret over http) — brug filstierne:
    //   coinSamples: Array.from({length: 14}, (_, i) => 'assets/coin/coin-' + (i+1) + '.wav'),
    //   flipSample: 'assets/coin-flip.mp3',
    // Her data:-URI'er, så eksemplet også lyder ved dobbeltklik:
    coinSamples: window.COIN_SAMPLES,
    flipSample: window.COIN_FLIP,
    spendStyle: 1,
    onCount: n => { $('#count').textContent = n.toLocaleString('da-DK'); },
    onFull: () => { note('Fuldt kranie — konfetti!'); },
    soundOn: true,
    tempo: 0.85,
    glintStyle: 'star',
    soundStyle: 'classic',
    restitution: 0.42,
    friction: 0.58,
    gravity: 1.5,
    bodyScale: 0.72,
    spin: 0.5,
    density: 0.006,
  };
}

/* ═══ Integrationen i spillet er de her tre kald ══════════════════════════ */

function pickUp(n) {                      // spilleren samlede mønter op
  for (let i = 0; i < n; i++) { coins++; sack.addCoin(); }
  vis();
}

function spend(price) {                   // spilleren købte noget
  if (coins < price) { note('Ikke råd — ' + coins + ' af ' + price); return; }
  coins -= price;
  sack.spendCoins(price);
  vis();
}

function reset() {
  coins = 0;
  sack.reset();
  vis();
}

/* ═══ Resten er kulisse ═══════════════════════════════════════════════════ */

let noteTil = 0;
function note(t) { $('#note').textContent = t; noteTil = performance.now() + 2000; }
function vis() {
  $('#count').textContent = coins.toLocaleString('da-DK');
  if (performance.now() > noteTil) {
    $('#note').textContent = coins + ' mønter · kraniet viser ' + Math.min(coins, 30) +
      (coins > 30 ? ' — resten løb over' : '');
  }
}

// Lyden: browseren nægter før siden er rørt, og motoren bygger kun sin
// lydkontekst ved fødslen. Så byg den i en gestus, og genstart den uanset
// hvad den påstår om sin tilstand. Uden det her er kraniet tavst.
function wake() {
  if (!sack) return;
  sack._ensureAudio();
  if (sack.audio && sack.audio.state !== 'running') sack.audio.resume();
  if (sack.audio && sack.audio.state === 'running') $('#note').textContent = 'Lyd: kører';
}
['pointerdown', 'touchend', 'keydown'].forEach(e =>
  window.addEventListener(e, wake, { passive: true }));

document.querySelectorAll('[data-add]').forEach(b =>
  b.addEventListener('click', () => pickUp(Number(b.dataset.add))));
document.querySelector('[data-spend]').addEventListener('click', () => spend(8));
document.querySelector('[data-reset]').addEventListener('click', reset);

(function vent(n) {
  if (window.Matter && window.CoinSack) { sack = new window.CoinSack($('#skull'), options()); return; }
  if (n < 80) { setTimeout(() => vent(n + 1), 100); return; }
  note(!window.Matter ? 'Matter.js kom aldrig — er du offline?' : 'Motoren kom aldrig igennem.');
})(0);

})();
</script>
</body>
</html>
