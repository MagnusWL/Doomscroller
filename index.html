<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Doomscroller — Ad Prototype</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9316425515738331"
     crossorigin="anonymous"></script>
<script id="aclib" type="text/javascript" src="https://acscdn.com/script/aclib.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }

  /* The scroller: one full screen per ad, snapped like TikTok */
  #feed {
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  .slide {
    height: 100dvh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  /* Ad container */
  .ad {
    width: 100%;
    max-width: 420px;
    height: 100%;
    max-height: 780px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.04);
    overflow: hidden;
  }

  /* Adcash renders its banner iframe into this slot. */
  .ac-slot {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ad-meta {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
  }

  /* Video ad slide: the ad itself fills the frame, like a feed post. */
  .vad {
    width: 100%;
    max-width: 420px;
    height: 100%;
    max-height: 780px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Nearly all VAST inventory is 16:9, so contain letterboxes rather than
     cropping the advertiser's message out of a vertical frame. */
  .vad video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .vad-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.6);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.75);
    z-index: 2;
  }

  .vad-sound {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
  }

  /* Inspirational image slide */
  .insp {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background-size: cover;
    background-position: center;
  }

  .insp::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
  }

  .insp-quote {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    padding: 32px;
    z-index: 1;
  }

  .insp-quote blockquote {
    font-size: clamp(20px, 5.5vw, 30px);
    font-weight: 700;
    line-height: 1.3;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }

  /* Fixed chrome over the feed */
  .counter {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 16px);
    left: 16px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  .hint {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .hint.gone { opacity: 0; }
</style>
</head>
<body>

<div id="feed"></div>
<div class="counter"><span id="current">1</span> / <span id="total">0</span></div>
<div class="hint" id="hint">Swipe or press ↓ for the next ad</div>

<script>
  // Always start at the first ad, even after a reload.
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  const feed = document.getElementById('feed');
  const currentEl = document.getElementById('current');
  const totalEl = document.getElementById('total');
  const hint = document.getElementById('hint');

  // Each slide gets its own hue so scrolling feels like distinct content.
  const hue = i => (i * 47) % 360;

  const QUOTES = [
    "The only way to do great work is to love what you do.",
    "It always seems impossible until it's done.",
    "Believe you can and you're halfway there.",
    "Success is not final, failure is not fatal: it is the courage to continue that counts.",
    "Your limitation—it's only your imagination.",
    "Great things never come from comfort zones.",
    "Dream it. Wish it. Do it.",
    "Little things make big days.",
    "Don't stop when you're tired. Stop when you're done.",
    "Wake up with determination. Go to bed with satisfaction.",
    "Do something today that your future self will thank you for.",
    "Push yourself, because no one else is going to do it for you.",
  ];

  const quoteMarkup = () => {
    const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    const imgSeed = Math.floor(Math.random() * 1000);
    return `
      <div class="insp" style="background-image:url('https://picsum.photos/seed/${imgSeed}/800/1400')">
        <div class="insp-quote"><blockquote>&ldquo;${quote}&rdquo;</blockquote></div>
      </div>`;
  };

  const AC_ZONE_ID = '11731342';

  // Ad servers collapse repeat requests carrying the same correlator into one
  // impression and stop filling, so every request needs a fresh one.
  const correlator = () => `${Date.now()}${Math.floor(Math.random() * 1e6)}`;

  // Video ad sources, tried in order until one fills. Adcash's In-stream Video
  // zone drops in as another entry here once it exists; VAST is an IAB standard,
  // so any network's tag works without touching the player below.
  const VAST_TAGS = [
    () => 'https://pubads.g.doubleclick.net/gampad/ads' +
          '?iu=/21775744923/external/single_ad_samples&sz=640x480' +
          '&cust_params=sample_ct%3Dlinear&ciu_szs=300x250&gdfp_req=1' +
          `&output=vast&unviewed_position_start=1&env=vp&impl=s&correlator=${correlator()}`,
  ];

  const px = url => { new Image().src = url; };
  const nodeText = el => el && el.textContent.trim();

  function collectTrackers(ad) {
    const t = { impression: [], click: [], events: {} };
    ad.querySelectorAll('Impression').forEach(n => t.impression.push(nodeText(n)));
    ad.querySelectorAll('ClickTracking').forEach(n => t.click.push(nodeText(n)));
    ad.querySelectorAll('TrackingEvents > Tracking').forEach(n => {
      const ev = n.getAttribute('event');
      (t.events[ev] = t.events[ev] || []).push(nodeText(n));
    });
    return t;
  }

  function mergeTrackers(outer, inner) {
    const events = Object.assign({}, outer.events);
    for (const [ev, urls] of Object.entries(inner.events)) {
      events[ev] = (events[ev] || []).concat(urls);
    }
    return {
      impression: outer.impression.concat(inner.impression),
      click: outer.click.concat(inner.click),
      events,
    };
  }

  // Progressive MP4 only — HLS and DASH need a media-source player we don't ship.
  function pickMedia(ad) {
    const files = [...ad.querySelectorAll('MediaFile')]
      .filter(f => (f.getAttribute('type') || '').includes('mp4'))
      .map(f => ({ url: nodeText(f), width: +f.getAttribute('width') || 0 }))
      .filter(f => f.url)
      .sort((a, b) => b.width - a.width);
    return files.find(f => f.width <= 1280) || files[0] || null;
  }

  // Networks routinely answer with a Wrapper pointing at another ad server
  // instead of the ad itself, and every hop carries trackers that must fire
  // alongside the final ad's own.
  async function resolveVast(url, depth = 0) {
    if (depth > 4) return null;
    let doc;
    try {
      const res = await fetch(url, { credentials: 'omit' });
      if (!res.ok) return null;
      doc = new DOMParser().parseFromString(await res.text(), 'text/xml');
    } catch {
      return null; // network error, or a tag server that withholds CORS headers
    }

    const ad = doc.querySelector('Ad');
    if (!ad) return null; // empty VAST: no fill
    const trackers = collectTrackers(ad);

    const wrapper = ad.querySelector('Wrapper > VASTAdTagURI');
    if (wrapper) {
      const inner = await resolveVast(nodeText(wrapper), depth + 1);
      return inner && Object.assign({}, inner, {
        trackers: mergeTrackers(trackers, inner.trackers),
      });
    }

    const media = pickMedia(ad);
    return media && { media, trackers, clickThrough: nodeText(ad.querySelector('ClickThrough')) };
  }

  async function loadVideoAd() {
    for (const tag of VAST_TAGS) {
      const ad = await resolveVast(tag());
      if (ad) return ad;
    }
    return null;
  }

  function playAd(box, ad) {
    const video = document.createElement('video');
    video.src = ad.media.url;
    video.muted = true; // browsers refuse to autoplay audible video
    video.playsInline = true;
    video.preload = 'auto';

    // Scrolling back to a slide resumes the same video, so every milestone
    // fires at most once per ad — an impression counted twice is a billing lie.
    const fired = new Set();
    const once = (key, urls) => {
      if (fired.has(key)) return;
      fired.add(key);
      urls.forEach(px);
    };
    const fireOnce = ev => once(ev, ad.trackers.events[ev] || []);
    const fireEvery = ev => (ad.trackers.events[ev] || []).forEach(px);

    video.addEventListener('playing', () => {
      once('impression', ad.trackers.impression);
      fireOnce('start');
    });

    video.addEventListener('timeupdate', () => {
      const p = video.currentTime / (video.duration || Infinity);
      if (p >= 0.25) fireOnce('firstQuartile');
      if (p >= 0.5) fireOnce('midpoint');
      if (p >= 0.75) fireOnce('thirdQuartile');
    });

    video.addEventListener('ended', () => fireOnce('complete'));

    const badge = document.createElement('div');
    badge.className = 'vad-badge';
    badge.textContent = 'Ad';

    const sound = document.createElement('button');
    sound.className = 'vad-sound';
    sound.textContent = '🔇';
    sound.addEventListener('click', e => {
      e.stopPropagation();
      video.muted = !video.muted;
      sound.textContent = video.muted ? '🔇' : '🔊';
      fireEvery(video.muted ? 'mute' : 'unmute');
    });

    if (ad.clickThrough) {
      box.style.cursor = 'pointer';
      box.addEventListener('click', () => {
        ad.trackers.click.forEach(px);
        window.open(ad.clickThrough, '_blank', 'noopener');
      });
    }

    box.textContent = '';
    box.append(video, badge, sound);
    video.play().catch(() => {});
    return video;
  }

  let count = 0;

  function addSlides(n) {
    const frag = document.createDocumentFragment();
    const newAdSlots = [];
    for (let i = 0; i < n; i++) {
      count++;
      const slide = document.createElement('section');
      slide.className = 'slide';
      slide.dataset.index = count;
      slide.style.background =
        `linear-gradient(160deg, hsl(${hue(count)} 70% 22%), hsl(${hue(count) + 40} 65% 10%))`;

      // Every other slide is filler; the ad slides alternate video and banner.
      if (count % 2 === 0) {
        slide.innerHTML = quoteMarkup();
      } else if (((count + 1) / 2) % 2 === 1) {
        slide.innerHTML = '<div class="vad"><div class="ad-meta">Loading ad…</div></div>';
      } else {
        const slotId = `ac-slot-${count}`;
        slide.innerHTML = `
          <div class="ad">
            <div class="ac-slot" id="${slotId}"></div>
            <div class="ad-meta">Ad ${count}</div>
          </div>`;
        newAdSlots.push(slotId);
      }
      frag.appendChild(slide);
    }
    feed.appendChild(frag);
    totalEl.textContent = count;
    observeTail();

    // Fill each new slot. Must run after the slides are in the DOM, since
    // Adcash looks up renderIn by selector. Inline <script> tags don't
    // execute when inserted via innerHTML, hence the programmatic call.
    if (typeof aclib !== 'undefined') {
      for (const id of newAdSlots) {
        aclib.runBanner({ zoneId: AC_ZONE_ID, renderIn: `#${id}` });
      }
    }
  }

  // Track which ad is on screen for the counter. Root is the feed itself,
  // since that's the scroll container (not the window).
  const seen = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting) currentEl.textContent = e.target.dataset.index;
    }
  }, { root: feed, threshold: 0.6 });

  // Append more ads when the last one scrolls into view — endless feed.
  const tail = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      tail.disconnect();
      addSlides(5);
    }
  }, { root: feed, rootMargin: '400px 0px' });

  // Requesting every ad up front would burn the advertiser's budget on
  // impressions nobody sees, and a wall of autoplaying video gets throttled
  // by the browser. So a video slide only fetches once it reaches the screen.
  const videoSlides = new IntersectionObserver(entries => {
    for (const e of entries) {
      const box = e.target.querySelector('.vad');
      if (!box) continue;
      const video = box.querySelector('video');
      if (!e.isIntersecting) {
        if (video) video.pause();
      } else if (box.dataset.filled) {
        if (video) video.play().catch(() => {});
      } else {
        box.dataset.filled = '1';
        fillVideoSlide(box);
      }
    }
  }, { root: feed, threshold: 0.6 });

  async function fillVideoSlide(box) {
    const ad = await loadVideoAd();
    // An unfilled slot would otherwise sit as a dead black slide mid-feed.
    if (!ad) box.closest('.slide').innerHTML = quoteMarkup();
    else playAd(box, ad);
  }

  function observeTail() {
    const slides = feed.querySelectorAll('.slide');
    slides.forEach(s => {
      seen.observe(s);
      if (s.querySelector('.vad')) videoSlides.observe(s);
    });
    tail.observe(slides[slides.length - 1]);
  }

  // Arrow keys / space, for desktop.
  window.addEventListener('keydown', e => {
    const step = { ArrowDown: 1, ArrowUp: -1, ' ': 1, PageDown: 1, PageUp: -1 }[e.key];
    if (!step) return;
    e.preventDefault();
    feed.scrollBy({ top: step * feed.clientHeight, behavior: 'smooth' });
  });

  feed.addEventListener('scroll', () => hint.classList.add('gone'), { once: true });

  addSlides(8);
</script>

</body>
</html>
