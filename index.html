<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Doomscroller — Ad Prototype</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9316425515738331"
     crossorigin="anonymous"></script>
<script id="aclib" type="text/javascript" src="https://acscdn.com/script/aclib.js"></script>
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
<script src="https://unpkg.com/videojs-contrib-ads/dist/videojs.ads.js"></script>
<script src="https://unpkg.com/videojs-ima/dist/videojs.ima.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }

  /* The scroller: one full screen per ad, snapped like TikTok */
  #feed {
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  .slide {
    height: 100dvh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Ad container */
  .ad {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Adcash renders its banner iframe into this slot. */
  .ac-slot {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-js,
  .video-js .vjs-tech {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hint {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .hint.gone { opacity: 0; }
</style>
</head>
<body>

<div id="feed"></div>
<div class="hint" id="hint">Swipe or press ↓ for the next ad</div>

<script>
  // Always start at the first ad, even after a reload.
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  const feed = document.getElementById('feed');
  const hint = document.getElementById('hint');

  const AD_TAG_URL = 'https://youradexchange.com/video/select.php?r=11731598';

  let count = 0;

  function addSlides(n) {
    const frag = document.createDocumentFragment();
    const newVideoIds = [];
    for (let i = 0; i < n; i++) {
      count++;
      const slide = document.createElement('section');
      slide.className = 'slide';
      slide.dataset.index = count;

      const videoId = `ac-video-${count}`;
      slide.innerHTML = `
        <div class="ad">
          <video id="${videoId}" class="video-js" playsinline muted></video>
        </div>`;
      newVideoIds.push(videoId);

      frag.appendChild(slide);
    }
    feed.appendChild(frag);
    observeTail();

    // Must run after the slides are in the DOM, since videojs looks up
    // the <video> element by id. Muted so autoplay isn't blocked by
    // browser policy. Guarded so a blocked CDN script only skips the
    // video ads instead of throwing and killing the whole feed.
    if (typeof videojs !== 'undefined') {
      for (const id of newVideoIds) {
        const player = videojs(id);
        if (typeof player.ima === 'function') {
          player.ima({ adTagUrl: AD_TAG_URL });
        }
        player.muted(true);
        player.play().catch(() => {});
      }
    }
  }

  // Append more ads when the last one scrolls into view — endless feed.
  const tail = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      tail.disconnect();
      addSlides(5);
    }
  }, { root: feed, rootMargin: '400px 0px' });

  function observeTail() {
    const slides = feed.querySelectorAll('.slide');
    tail.observe(slides[slides.length - 1]);
  }

  // Arrow keys / space, for desktop.
  window.addEventListener('keydown', e => {
    const step = { ArrowDown: 1, ArrowUp: -1, ' ': 1, PageDown: 1, PageUp: -1 }[e.key];
    if (!step) return;
    e.preventDefault();
    feed.scrollBy({ top: step * feed.clientHeight, behavior: 'smooth' });
  });

  feed.addEventListener('scroll', () => hint.classList.add('gone'), { once: true });

  addSlides(8);
</script>

</body>
</html>
