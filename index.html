<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Doomscroller — Ad Prototype</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9316425515738331"
     crossorigin="anonymous"></script>
<script id="aclib" type="text/javascript" src="https://acscdn.com/script/aclib.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }

  /* The scroller: one full screen per ad, snapped like TikTok */
  #feed {
    height: 100dvh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  .slide {
    height: 100dvh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Ad container: 2 banners stacked vertically per slide */
  .ad {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Adcash renders its banner iframe into this slot. */
  .ac-slot {
    width: 100%;
    height: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hint {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .hint.gone { opacity: 0; }

  .brain-stats {
    position: fixed;
    top: env(safe-area-inset-top);
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }
  .brain-stats .label {
    opacity: 0.6;
    margin-right: 4px;
  }

  .refill-btn {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    padding: 16px 28px;
    border: none;
    border-radius: 999px;
    background: #fff;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }
  .refill-btn.show { display: block; }

  .yt-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.85);
    align-items: center;
    justify-content: center;
  }
  .yt-modal.show { display: flex; }

  .yt-modal-box {
    position: relative;
    width: min(92vw, 640px);
    aspect-ratio: 16 / 9;
  }
  .yt-modal-box iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
  }

  .yt-modal-close {
    position: absolute;
    top: -44px;
    right: 0;
    border: none;
    background: none;
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="feed"></div>
<div class="brain-stats" id="brainStats"></div>
<button class="refill-btn" id="refillBtn">🧠 Get more braincells</button>
<div class="yt-modal" id="ytModal">
  <div class="yt-modal-box">
    <button class="yt-modal-close" id="ytModalClose">×</button>
    <iframe id="ytFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>
<div class="hint" id="hint">Swipe or press ↓ for the next ad</div>

<script>
  // Always start at the first ad, even after a reload.
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  const feed = document.getElementById('feed');
  const hint = document.getElementById('hint');
  const brainStats = document.getElementById('brainStats');
  const refillBtn = document.getElementById('refillBtn');
  const ytModal = document.getElementById('ytModal');
  const ytFrame = document.getElementById('ytFrame');
  const ytModalClose = document.getElementById('ytModalClose');

  const AC_ZONE_ID = '11731342';

  // Real, verified-embeddable lectures on famously dry subjects.
  const BORING_LECTURES = [
    'wWnfJ0-xXRE', // MIT 8.01x Physics intro — Walter Lewin
    'IJquEYhiq_U', // MIT cryptocurrency engineering — signatures & hashing
    'kBdfcR-8hEY', // Harvard Justice — Michael Sandel, episode 1
    'ZK3O402wf1c', // MIT 18.06 Linear Algebra — Gilbert Strang, lecture 1
  ];

  // Average human neuron count, used here as a "braincell" starting budget.
  const BRAINCELLS_START = 86_000_000_000;
  const LOSS_FRACTION_START = 0.08;  // % of remaining braincells lost on the first swipe
  const LOSS_FRACTION_GROWTH = 1.3;  // that % grows 30% per swipe — empties out around swipe 10
  const DEPLETED_THRESHOLD = BRAINCELLS_START * 0.005;

  let braincells = BRAINCELLS_START;
  let lossFraction = LOSS_FRACTION_START;
  let lastSeenIndex = 1; // slide 1 is the initial view, not a swipe

  function renderBrainStats() {
    const speed = braincells * lossFraction;
    brainStats.innerHTML =
      `<span><span class="label">🧠 Braincells</span>${Math.round(braincells).toLocaleString()}</span>` +
      `<span><span class="label">📈 Brainrot speed</span>${Math.round(speed).toLocaleString()}/scroll</span>`;
  }

  function decayBrain() {
    if (braincells <= 0) return;
    braincells -= braincells * lossFraction;
    if (braincells < DEPLETED_THRESHOLD) braincells = 0;
    lossFraction = Math.min(1, lossFraction * LOSS_FRACTION_GROWTH);
    renderBrainStats();
    if (braincells <= 0) refillBtn.classList.add('show');
  }

  refillBtn.addEventListener('click', () => {
    refillBtn.classList.remove('show');
    const id = BORING_LECTURES[Math.floor(Math.random() * BORING_LECTURES.length)];
    ytFrame.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
    ytModal.classList.add('show');
  });

  ytModalClose.addEventListener('click', () => {
    ytModal.classList.remove('show');
    ytFrame.src = ''; // stop playback
    braincells = BRAINCELLS_START;
    lossFraction = LOSS_FRACTION_START;
    renderBrainStats();
  });

  renderBrainStats();

  let count = 0;

  function addSlides(n) {
    const frag = document.createDocumentFragment();
    const newAdSlots = [];
    for (let i = 0; i < n; i++) {
      count++;
      const slide = document.createElement('section');
      slide.className = 'slide';
      slide.dataset.index = count;

      const slotIdA = `ac-slot-${count}-a`;
      const slotIdB = `ac-slot-${count}-b`;
      slide.innerHTML = `
        <div class="ad">
          <div class="ac-slot" id="${slotIdA}"></div>
          <div class="ac-slot" id="${slotIdB}"></div>
        </div>`;
      newAdSlots.push(slotIdA, slotIdB);

      frag.appendChild(slide);
    }
    feed.appendChild(frag);
    observeTail();

    // Fill each new slot. Must run after the slides are in the DOM, since
    // Adcash looks up renderIn by selector. Inline <script> tags don't
    // execute when inserted via innerHTML, hence the programmatic call.
    if (typeof aclib !== 'undefined') {
      for (const id of newAdSlots) {
        aclib.runBanner({ zoneId: AC_ZONE_ID, renderIn: `#${id}` });
      }
    }
  }

  // Append more ads when the last one scrolls into view — endless feed.
  const tail = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      tail.disconnect();
      addSlides(5);
    }
  }, { root: feed, rootMargin: '400px 0px' });

  // Decay the braincell counter once per newly-reached slide, forward only.
  const progress = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (!e.isIntersecting) continue;
      const idx = Number(e.target.dataset.index);
      if (idx > lastSeenIndex) {
        lastSeenIndex = idx;
        decayBrain();
      }
    }
  }, { root: feed, threshold: 0.6 });

  function observeTail() {
    const slides = feed.querySelectorAll('.slide');
    slides.forEach(s => progress.observe(s));
    tail.observe(slides[slides.length - 1]);
  }

  // Arrow keys / space, for desktop.
  window.addEventListener('keydown', e => {
    const step = { ArrowDown: 1, ArrowUp: -1, ' ': 1, PageDown: 1, PageUp: -1 }[e.key];
    if (!step) return;
    e.preventDefault();
    feed.scrollBy({ top: step * feed.clientHeight, behavior: 'smooth' });
  });

  feed.addEventListener('scroll', () => hint.classList.add('gone'), { once: true });

  addSlides(8);
</script>

</body>
</html>
